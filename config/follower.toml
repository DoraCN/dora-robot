# config/follower.toml — 从臂守护进程配置

[arm]
id = "arm_1"
type = "so101"

[arm.so101]
baud = 1_000_000
ids = [1, 2, 3, 4, 5, 6]
vid = "0x1A86"
pid = "0x55D3"
serial = "5A7A055502"

[zenoh]
mode = "peer"

[recorder]
venv = "training/.venv"
repo_id = "local/teleop"
root = "datasets"

[daemon]
auto_torque_on = false
reconnect_base_sec = 1
reconnect_max_sec = 30
