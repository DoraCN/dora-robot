nodes:
  - id: capture
    path: target/release/tr-capture
    outputs:
      - action
      - observation_state
      - episode_end
    env:
      TR_ARM_ID: "${TR_ARM_ID:-arm_1}"

  - id: camera_front
    path: python
    args: -m tr_lerobot.camera_node
    outputs:
      - image
    env:
      TR_CAMERA_ID: "0"
      TR_CAMERA_WIDTH: "640"
      TR_CAMERA_HEIGHT: "480"
      TR_CAMERA_FPS: "30"
      PYTHONPATH: "${PWD}/training"

  - id: camera_wrist
    path: python
    args: -m tr_lerobot.camera_node
    outputs:
      - image
    env:
      TR_CAMERA_ID: "1"
      TR_CAMERA_WIDTH: "640"
      TR_CAMERA_HEIGHT: "480"
      TR_CAMERA_FPS: "30"
      PYTHONPATH: "${PWD}/training"

  - id: recorder
    path: python
    args: -m tr_lerobot.recorder
    inputs:
      action: capture/action
      observation_state: capture/observation_state
      episode_end: capture/episode_end
      observation_images_front: camera_front/image
      observation_images_wrist: camera_wrist/image
    env:
      PYTHONPATH: "${PWD}/training"
      LEROBOT_REPO_ID: "local/teleop"
      LEROBOT_ROOT: "./datasets"
      LEROBOT_FPS: "30"
      LEROBOT_TASK: "${TR_TASK:-teleop}"
      TR_CAMERAS: "front:480x640,wrist:480x640"
